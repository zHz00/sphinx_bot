A9 = Elbereth
Q10 = Вы нашли лестницу вниз и собираетесь спуститься на следующий этаж. Какой командой вы это сделаете?
A10 = <|>
Q11 = Вопрос по лору игры. После сотворения миря жестокий бог Молох восстал против своего властелина. Как его звали? 1. Яхве 2. Мардук 3. Тиамат 4. Демиург
A11 = 2|мардук
Q12 = Как называется главный артефакт, который надо добыть, чтобы пройти игру полностью?
