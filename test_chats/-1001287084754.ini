A6 = c
Q7 = Вам известно, что питомцы могут помочь определить, проклятый предмет или нет. В чём может заключаться его помощь? 1. Питомец подберёт предмет; 2. Питомец будет избегать предмет; 3. Питомец наденет предмет на себя; 4. Питомец подберёт предмет, а потом выбросит его куда подальше.
A7 = 2|избегать|будет избегать|будет избегать предмет|питомец будет избегать предмет
