[COMMON]
ignore = 0
mute_timer = 604800
reactions_max = 5
reactions_warning = 2
reactions_final_warning = 4
[MESSAGES]
profile = профиль
hello = #N (#I), здравствуйте!\n\nИз-за атаки ботов всем новым пользователям отключена отправка сообщений на одну неделю.\n\nДля досрочного снятия блокировки пишите мне, боту, в личку.
unban = Пользователь #N разбанен.
ban = Пользователь #N забанен.
reactions_warning = #N (#I), просим вас не ставить реакции к сообщениям. Если вы отправите больше десяти реакций, вы будете забанены. Осталось реакций: 3.
reactions_final_warning = #N (#I), вторично предупреждаем вас не ставить реакции. Вы будете забанены, когда поставите следующую реакцию.
