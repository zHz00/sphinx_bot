[COMMON]
ignore = 0
mute_timer = 604800
reactions_max = 10
reactions_warning = 5
reactions_final_warning = 8
[MESSAGES]
hello = #N (#I), здравствуйте!\n\nИз-за атаки ботов всем новым пользователям отключена отправка сообщений на одну неделю.\n\nДля досрочного снятия блокировки пишите мне, боту, в личку.
unban = Пользователь #N разбанен вручную.
ban = Пользователь #N забанен.
reactions_warning = #N (#I), просим вас не ставить реакции к сообщениям. Если вы отправите больше десяти реакций, вы будете забанены. Осталось реакций: 5.
reactions_final_warning = #N (#I), вторично предупреждаем вас не ставить реакции. Вы будете забанены через две реакции.
[QUESTIONS]
Q1 = Напишите "я человек".
A1 = я человек