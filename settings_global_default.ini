[COMMON]
new_chats_allowed=1
poll_pause=5
poll_wait_timeout=30
poll_error_pause=9
auto_delete_time=3599
token=XXXX
owner_id=XXXX
command=uname -a
command_path=.
[MESSAGES]
greeting=Это бот-администратор чатов. Если вы вошли в один из чатов, где он установлен, то вы получаете временный или постоянный мьют, а именно невозможность отправки сообщений. Это сделано для противодействия спам-атакам.\n\nВы можете подождать установленное время или ответить на контрольный вопрос для того, чтобы подтвердить, что вы не бот.\n\nНажмите "Статус", чтобы узнать, в каких чатах, имеющих отношение к данному боту, вы состоите, и какой там статус имеете. Нажмите "Я не бот", чтобы запустить процедуру снятия мьюта.
check_button=Статус
check=Вот список чатов, в которых вы состоите:
mode_restricted=Вы не можете отправлять сообщения в этот чат. Срок мьюта: #D дней
mode_restricted_forever=Вы не можете отправлять сообщения в этот чат. Срок мьюта: бессрочно
mode_allowed=Вы можете отправлять сообщения в этот чат.
unmute_button=Я не бот
unmute=Выберите чат, для которого хотите пройти проверку.
unmute_question=Для прохождения проверки необходимо ответить на вопрос. При ответе регистр буквы игнорируется, буква ё преобразуется в е. Ответ должен совпадать с тем, который указан администраторами. Если вы ответите неправильно, то сможете попробовать ещё раз. Количество попыток не ограничено. Итак, вопрос:
unmute_question_short=Новый вопрос:
unmute_success=Вы дали правильный ответ. Ограничения на отправку сняты.
unmute_fail=Ответ неправильный. Подождите #T секунд, а затем нажмите кнопку ниже, чтобы ответить на другой вопрос.
again=Новый вопрос
unknown=Неизвестная команда. Воспользуйтесь кнопками.
early=Пауза после неправильного ответа составляет #T секунд. Попробуйте позднее.
[PROXY]
ip=127.0.0.1
port=1234
user=
pass=
